name: CI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version sync
        run: node scripts/check-version-sync.js

  typescript:
    name: TypeScript (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests
        run: pnpm test

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Run Rust tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml

  rust-cross:
    name: Rust (${{ matrix.os }} - ${{ matrix.target }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest-8-cores
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Run Rust tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

  windows-integration:
    name: Windows Integration Test
    if: github.event_name != 'pull_request'
    runs-on: windows-latest-8-cores
    needs: rust-cross

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build Rust CLI
        run: cargo build --release --manifest-path cli/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Install npm dependencies
        run: pnpm install

      - name: Build TypeScript
        run: pnpm build

      - name: Copy CLI binary to bin directory
        run: |
          Copy-Item cli/target/x86_64-pc-windows-msvc/release/nstbrowser-ai-agent.exe bin/nstbrowser-ai-agent-win32-x64.exe

      - name: Test nstbrowser-ai-agent install command
        run: |
          $env:PATH = "$pwd\bin;$env:PATH"
          for ($i = 1; $i -le 3; $i++) {
            bin/nstbrowser-ai-agent-win32-x64.exe install
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "Attempt $i failed, retrying in 10 seconds..."
            Start-Sleep -Seconds 10
          }
          exit 1
        shell: pwsh
        timeout-minutes: 10

      - name: Verify Chromium was installed
        run: |
          $playwrightPath = "$env:LOCALAPPDATA\ms-playwright"
          if (Test-Path $playwrightPath) {
            Write-Host "Playwright browsers installed at: $playwrightPath"
            Get-ChildItem $playwrightPath -Recurse -Depth 2 | Select-Object -First 20
          } else {
            Write-Error "Playwright browsers not found!"
            exit 1
          }
        shell: pwsh

      - name: Test daemon lifecycle (open, snapshot, close)
        run: |
          $env:PATH = "$pwd\bin;$env:PATH"
          Write-Host "--- Opening page ---"
          bin/nstbrowser-ai-agent-win32-x64.exe open https://example.com
          if ($LASTEXITCODE -ne 0) { Write-Error "open failed"; exit 1 }
          Write-Host "--- Taking snapshot ---"
          $snapshot = bin/nstbrowser-ai-agent-win32-x64.exe snapshot
          if ($LASTEXITCODE -ne 0) { Write-Error "snapshot failed"; exit 1 }
          Write-Host $snapshot
          Write-Host "--- Closing browser ---"
          bin/nstbrowser-ai-agent-win32-x64.exe close
          if ($LASTEXITCODE -ne 0) { Write-Error "close failed"; exit 1 }
          Write-Host "--- Windows daemon lifecycle test passed ---"
        shell: pwsh
        timeout-minutes: 5

  serverless-chromium:
    name: Serverless Chromium (@sparticuz/chromium)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install @sparticuz/chromium
        run: pnpm add -D @sparticuz/chromium

      - name: Build TypeScript
        run: pnpm build

      - name: Run serverless integration test
        run: pnpm exec vitest run test/serverless.test.ts

  global-install:
    name: Global Install (${{ matrix.os }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    needs: rust-cross
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: nstbrowser-ai-agent-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: nstbrowser-ai-agent-darwin-arm64
          - os: windows-latest-8-cores
            target: x86_64-pc-windows-msvc
            binary: nstbrowser-ai-agent-win32-x64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build Rust CLI
        run: cargo build --release --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Install npm dependencies
        run: pnpm install

      - name: Build TypeScript
        run: pnpm build

      - name: Copy CLI binary to bin directory (Unix)
        if: runner.os != 'Windows'
        run: cp cli/target/${{ matrix.target }}/release/nstbrowser-ai-agent bin/${{ matrix.binary }}

      - name: Copy CLI binary to bin directory (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item cli/target/${{ matrix.target }}/release/nstbrowser-ai-agent.exe bin/${{ matrix.binary }}

      - name: Test npm global install
        run: |
          npm pack
          npm install -g nstbrowser-ai-agent-*.tgz
          nstbrowser-ai-agent --version
        shell: bash

      - name: Verify symlink points to native binary (Unix)
        if: runner.os != 'Windows'
        run: |
          SYMLINK=$(npm prefix -g)/bin/nstbrowser-ai-agent
          TARGET=$(readlink "$SYMLINK")
          echo "Symlink: $SYMLINK"
          echo "Target: $TARGET"
          if [[ "$TARGET" != *"${{ matrix.binary }}"* ]]; then
            echo "ERROR: Symlink should point to native binary, not JS wrapper"
            exit 1
          fi
          echo "✓ Symlink correctly points to native binary"
        shell: bash

      - name: Verify shim points to native binary (Windows)
        if: runner.os == 'Windows'
        run: |
          $shimPath = "$(npm prefix -g)\nstbrowser-ai-agent.cmd"
          $content = Get-Content $shimPath -Raw
          echo "Shim path: $shimPath"
          echo "Shim content:"
          echo $content
          if ($content -notmatch "nstbrowser-ai-agent-win32-x64\.exe") {
            echo "ERROR: Shim should point to native .exe, not JS wrapper"
            exit 1
          }
          echo "✓ Shim correctly points to native binary"
        shell: pwsh
